# -----------------------------------------------------------------------
# HQL Tester configuration
# -----------------------------------------------------------------------

# Set to "oracle" or "postgres" — controls which expected SQL fragment
# is asserted in each test case. Switch this when you change your DB.
hql-tester.active-dialect=oracle

# Row cap for SELECT queries
hql-tester.max-results=100

# Folder where per-run JSON result files are written
hql-tester.result-output-folder=./hql-test-results

# -----------------------------------------------------------------------
# Hibernate SQL logging
# -----------------------------------------------------------------------
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.show_sql=true
