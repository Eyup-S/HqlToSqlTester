# -----------------------------------------------------------------------
# HQL Tester configuration — paste into your application-dev.properties
# -----------------------------------------------------------------------

# Set false (or omit) in production
hql-tester.enabled=true

# Absolute or relative path to the folder containing .hql files
hql-tester.query-folder=./hql-test-queries

# Row cap for SELECT queries
hql-tester.max-results=100

# Folder where per-run JSON result files are written
hql-tester.result-output-folder=./hql-test-results

# -----------------------------------------------------------------------
# Hibernate SQL logging — optional; inspector captures SQL regardless
# -----------------------------------------------------------------------
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.show_sql=true
